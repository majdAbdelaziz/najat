<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" role="img" aria-label="نجاة — دليل الأزمة المالية">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@700&amp;display=swap');
      .logo-ar { font-family: 'Noto Kufi Arabic', sans-serif; font-weight: 700; }
    </style>
  </defs>

  <!-- Lifebuoy icon -->
  <g transform="translate(28,30)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#0F6E56" stroke-width="4"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="11" fill="none" stroke="#0F6E56" stroke-width="3"/>
    <!-- Cross ropes -->
    <line x1="-22" y1="0" x2="-11" y2="0" stroke="#5DCAA5" stroke-width="3" stroke-linecap="round"/>
    <line x1="11" y1="0" x2="22" y2="0" stroke="#5DCAA5" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-22" x2="0" y2="-11" stroke="#5DCAA5" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="11" x2="0" y2="22" stroke="#5DCAA5" stroke-width="3" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#0F6E56"/>
  </g>

  <!-- Arabic text نجاة -->
  <text x="115" y="38" class="logo-ar"
    font-family="'Noto Kufi Arabic', sans-serif"
    font-weight="700"
    font-size="30"
    fill="#0F6E56"
    text-anchor="middle"
    direction="rtl">نجاة</text>

  <!-- Tagline -->
  <text x="115" y="52"
    font-family="'Noto Kufi Arabic', sans-serif"
    font-size="9"
    fill="#5DCAA5"
    text-anchor="middle"
    direction="rtl">دليلك في الأزمة المالية</text>
</svg>
